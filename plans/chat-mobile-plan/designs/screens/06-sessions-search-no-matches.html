<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sessions — No Matches · Superset Mobile</title>
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../components.css" />
  <script src="../icons.js" defer></script>
</head>
<body>
<div class="stage">
  <div class="iphone-frame">
    <div class="iphone-viewport">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span>9:41</span>
        <div class="sb-right">
          <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.2a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm-3.6-3a5 5 0 0 1 7.2 0l1.4-1.4a7 7 0 0 0-10 0l1.4 1.4Zm-2.8-2.8a9 9 0 0 1 12.8 0L15.8 4a11 11 0 0 0-15.6 0l1.4 1.4Z"/></svg>
          <span class="sb-battery"><span class="sb-battery-body"><span class="sb-battery-fill"></span></span></span>
        </div>
      </div>

      <div class="app-content">

        <header class="app-header">
          <button class="menu-btn"><i data-lucide="menu"></i></button>
          <span class="title">Sessions</span>
          <button class="host-chip">
            <i data-lucide="laptop"></i><span>macbook</span>
            <i data-lucide="chevron-down" class="chev" style="width:14px;height:14px"></i>
          </button>
        </header>

        <div class="search-bar" style="border-color: var(--border-strong); background: var(--surface-elev);">
          <i data-lucide="search" style="color: var(--accent-live)"></i>
          <input value="zzzz" />
          <span class="clear"><i data-lucide="x"></i></span>
        </div>

        <section class="empty-state" style="padding-bottom: 80px">
          <div class="em-icon"><i data-lucide="search-x"></i></div>
          <h2>No matches</h2>
          <p>No sessions on <strong style="color: var(--fg)">macbook</strong> match <code style="font-family: var(--font-mono); background: var(--surface); padding: 2px 6px; border-radius: 4px;">"zzzz"</code>. Try a different query or clear the search.</p>
          <button class="em-cta" style="background: var(--surface-elev); color: var(--fg); border: 0.5px solid var(--border-strong);">Clear search</button>
        </section>

        <nav class="tab-bar">
          <div class="tab"><i data-lucide="check-square"></i><span>Tasks</span></div>
          <div class="tab active"><i data-lucide="message-square"></i><span>Chat</span></div>
          <div class="tab"><i data-lucide="more-horizontal"></i><span>More</span></div>
        </nav>

      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
