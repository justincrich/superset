<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Composer — Thinking Picker · Superset Mobile</title>
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../components.css" />
  <script src="../icons.js" defer></script>
</head>
<body>
<div class="stage">
  <div class="iphone-frame">
    <div class="iphone-viewport">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span>9:41</span>
        <div class="sb-right">
          <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.2a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm-3.6-3a5 5 0 0 1 7.2 0l1.4-1.4a7 7 0 0 0-10 0l1.4 1.4Zm-2.8-2.8a9 9 0 0 1 12.8 0L15.8 4a11 11 0 0 0-15.6 0l1.4 1.4Z"/></svg>
          <span class="sb-battery"><span class="sb-battery-body"><span class="sb-battery-fill"></span></span></span>
        </div>
      </div>

      <div class="app-content">

        <header class="app-header">
          <button class="menu-btn"><i data-lucide="arrow-left"></i></button>
          <div style="flex: 1; min-width: 0; text-align: center;">
            <div style="font-size: 14px; font-weight: 500; letter-spacing: -0.01em;">Drizzle migration plan</div>
            <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 1px;">superset · chat-mobile-plan</div>
          </div>
          <button class="menu-btn"><i data-lucide="more-vertical"></i></button>
        </header>

        <div class="chat-scroll" style="opacity: 0.55"></div>

        <div class="popover" style="bottom: 90px; right: 12px; left: auto; width: 260px;">
          <div class="pop-section">Thinking</div>

          <div class="pop-row">
            <div class="lead"><i data-lucide="minus"></i></div>
            <div class="body">
              <div class="pop-cmd" style="font-family: var(--font-sans); font-weight: 500;">Off</div>
              <div class="pop-desc">Direct reply, no reasoning</div>
            </div>
          </div>

          <div class="pop-row">
            <div class="lead"><i data-lucide="signal-low"></i></div>
            <div class="body">
              <div class="pop-cmd" style="font-family: var(--font-sans); font-weight: 500;">Low</div>
              <div class="pop-desc">≤ 500 tokens of thinking</div>
            </div>
          </div>

          <div class="pop-row selected">
            <div class="lead" style="color: var(--accent-live)"><i data-lucide="signal-medium"></i></div>
            <div class="body">
              <div class="pop-cmd" style="font-family: var(--font-sans); font-weight: 500; color: var(--accent-live);">Medium</div>
              <div class="pop-desc">≤ 2k tokens · default</div>
            </div>
            <div class="check"><i data-lucide="check"></i></div>
          </div>

          <div class="pop-row">
            <div class="lead"><i data-lucide="signal-high"></i></div>
            <div class="body">
              <div class="pop-cmd" style="font-family: var(--font-sans); font-weight: 500;">High</div>
              <div class="pop-desc">≤ 8k tokens of thinking</div>
            </div>
          </div>

          <div class="pop-row">
            <div class="lead"><i data-lucide="signal"></i></div>
            <div class="body">
              <div class="pop-cmd" style="font-family: var(--font-sans); font-weight: 500;">Extra-high</div>
              <div class="pop-desc">Max thinking · slower, costlier</div>
            </div>
          </div>

        </div>

        <div class="composer-wrap">
          <div class="composer">
            <div class="textline placeholder">Ask follow-up…</div>
            <div class="ctrls" style="margin-top: 6px">
              <button class="pill-btn icon-only"><i data-lucide="paperclip"></i></button>
              <button class="pill-btn"><i data-lucide="sparkles"></i><span>sonnet-4.6</span><i data-lucide="chevron-down" class="chev"></i></button>
              <button class="pill-btn" style="border-color: var(--accent-live); background: rgba(64, 224, 168, 0.08)"><i data-lucide="brain" style="color: var(--accent-live);"></i><span style="color: var(--accent-live);">med</span><i data-lucide="chevron-down" class="chev"></i></button>
              <div class="spacer"></div>
              <button class="send-btn disabled"><i data-lucide="arrow-up"></i></button>
            </div>
          </div>
        </div>

      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
