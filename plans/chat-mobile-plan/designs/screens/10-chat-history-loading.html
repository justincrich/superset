<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat — Loading History · Superset Mobile</title>
  <link rel="stylesheet" href="../tokens.css" />
  <link rel="stylesheet" href="../components.css" />
  <script src="../icons.js" defer></script>
</head>
<body>
<div class="stage">
  <div class="iphone-frame">
    <div class="iphone-viewport">
      <div class="dynamic-island"></div>

      <div class="status-bar">
        <span>9:41</span>
        <div class="sb-right">
          <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.2a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm-3.6-3a5 5 0 0 1 7.2 0l1.4-1.4a7 7 0 0 0-10 0l1.4 1.4Zm-2.8-2.8a9 9 0 0 1 12.8 0L15.8 4a11 11 0 0 0-15.6 0l1.4 1.4Z"/></svg>
          <span class="sb-battery"><span class="sb-battery-body"><span class="sb-battery-fill"></span></span></span>
        </div>
      </div>

      <div class="app-content">

        <header class="app-header">
          <button class="menu-btn"><i data-lucide="arrow-left"></i></button>
          <div style="flex: 1; min-width: 0; text-align: center;">
            <div style="font-size: 14px; font-weight: 500; letter-spacing: -0.01em;">Refactor relay tunnel reconnect</div>
            <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 1px; display: flex; align-items: center; justify-content: center; gap: 6px;">
              <span class="skeleton" style="width: 60px; height: 8px; display: inline-block;"></span>
              <span>·</span>
              <span class="skeleton" style="width: 28px; height: 8px; display: inline-block;"></span>
            </div>
          </div>
          <button class="menu-btn"><i data-lucide="more-vertical"></i></button>
        </header>

        <div class="chat-scroll">
          <div class="msg-user-row">
            <div class="skeleton" style="width: 70%; height: 56px; border-radius: 18px;"></div>
          </div>

          <div class="msg-asst-row">
            <div class="msg-asst-head">
              <span class="av">A</span>
              <span>Assistant</span>
            </div>
            <div class="skeleton" style="width: 100%; height: 14px;"></div>
            <div class="skeleton" style="width: 85%; height: 14px;"></div>
            <div class="skeleton" style="width: 62%; height: 14px;"></div>
            <div class="skeleton" style="width: 100%; height: 70px; margin-top: 8px;"></div>
          </div>

          <div class="msg-user-row">
            <div class="skeleton" style="width: 50%; height: 38px; border-radius: 18px;"></div>
          </div>

          <div class="msg-asst-row">
            <div class="msg-asst-head">
              <span class="av">A</span>
              <span>Assistant</span>
            </div>
            <div class="skeleton" style="width: 96%; height: 14px;"></div>
            <div class="skeleton" style="width: 78%; height: 14px;"></div>
          </div>

          <div style="display: flex; align-items: center; justify-content: center; padding: 12px; gap: 8px; color: var(--fg-muted); font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;">
            <span style="width: 14px; height: 14px; border: 1.5px solid var(--accent-live); border-top-color: transparent; border-radius: 50%; display: inline-block; animation: pulse 0.9s linear infinite;"></span>
            <span>Loading history…</span>
          </div>
        </div>

        <div class="composer-wrap">
          <div class="composer" style="opacity: 0.5">
            <div class="textline placeholder">Loading…</div>
            <div class="ctrls" style="margin-top: 6px">
              <button class="pill-btn icon-only"><i data-lucide="paperclip"></i></button>
              <button class="pill-btn"><i data-lucide="sparkles"></i><span>sonnet-4.6</span></button>
              <div class="spacer"></div>
              <button class="send-btn disabled"><i data-lucide="arrow-up"></i></button>
            </div>
          </div>
        </div>

      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
