<!DOCTYPE html>
<html lang="en">

  <link rel="stylesheet" href="../../../../typography/fonts.css">
  <link rel="stylesheet" href="../../../../tokens/tokens.css">

  <style>
    /* ================================================================
       view-local layout glue — ONLY .view-chat-view-error-retry__* rules.
       Never redefines .atom-* or .mol-* classes.
       ================================================================ */

    /* ---- Page harness ----------------------------------------- */
    body {
      background: var(--surface-page);
    }

    .preview-plate {
      padding: var(--space-8) var(--space-4);
      background: var(--surface-soft);
      border-bottom: 1px solid var(--border-subtle);
    }

    .preview-plate h1 {
      margin: 0 0 var(--space-2);
    }

    .preview-plate .crumb {
      font-family:    var(--font-mono);
      font-size:      var(--font-size-meta);
      color:          var(--text-muted);
      letter-spacing: var(--tracking-mono);
      text-transform: uppercase;
    }

    .pegboard {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-8);
      padding:        var(--space-8) var(--space-4);
    }

    /* Full-width pane — device centered inside */
    .pane {
      border:         1px solid var(--border-subtle);
      border-radius:  var(--radius-default);
      padding:        var(--space-8) var(--space-4);
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            var(--space-4);
    }

    .pane-label {
      align-self:     flex-start;
      display:        inline-block;
      padding:        var(--space-1) var(--space-3);
      background:     var(--surface-sunken);
      border:         1px solid var(--border-subtle);
      border-radius:  var(--radius-subtle);
      font-family:    var(--font-mono);
      font-size:      var(--font-size-meta);
      letter-spacing: var(--tracking-mono);
      color:          var(--text-muted);
      text-transform: uppercase;
    }

    /* ---- View viewport layout --------------------------------- */
    /* The viewport inside atom-device-bezel is a flex column.
       These classes wire up the flex slots without touching any
       atom or molecule rule. */

    /* Error body — fills the space between header and composer,
       centering the empty-state content vertically and horizontally. */
    .view-chat-view-error-retry__body {
      flex:            1;
      overflow:        hidden;
      display:         flex;
      align-items:     center;
      justify-content: center;
      padding:         var(--space-4);
    }

    /* Composer footer — mirrors the pattern from chat-view-thread */
    .view-chat-view-error-retry__composer {
      border-top:        1px solid var(--border-subtle);
      display:           flex;
      flex-direction:    column;
      gap:               var(--space-2);
      padding-block-end: var(--safe-area-bottom);
      background:        var(--surface-page);
      flex-shrink:       0;
      /* Visually disabled — session not loaded yet */
      opacity:           0.5;
      pointer-events:    none;
    }
  </style>
</head>

  ============================================================ -->
