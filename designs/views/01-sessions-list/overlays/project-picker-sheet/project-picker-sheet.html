<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>project-picker-sheet — UC-NAV §B</title>
  <link rel="stylesheet" href="../../../../typography/fonts.css">
  <link rel="stylesheet" href="../../../../tokens/tokens.css">
  <link rel="stylesheet" href="../../../../typography/type-modules.css">
  <link rel="stylesheet" href="../../../../atoms/_preview.css">
  <link rel="stylesheet" href="../../../../molecules/_atoms.css">
  <link rel="stylesheet" href="../../../../organisms/_molecules.css">
  <style>
    /* ================================================================
       view-project-picker-sheet — view-local layout glue only.
       Composition purity:
         ZERO .atom-* rules redefined here.
         ZERO .mol-* rules redefined here.
         ZERO hex literals.
         ZERO raw font-size / font-weight / line-height values.
         ZERO raw px in padding/margin/gap (1px structural borders
         and --elevation-sheet box-shadow documented as exceptions).
       Structural exceptions documented inline.
    ================================================================ */

    /* ---- Page harness ----------------------------------------- */
    body {
      background: var(--surface-page);
    }

    .preview-plate {
      padding:       var(--space-8) var(--space-4);
      background:    var(--surface-soft);
      border-bottom: 1px solid var(--border-subtle);
    }

    .preview-plate h1 {
      margin: 0 0 var(--space-2);
    }

    .preview-plate .crumb {
      font-family:    var(--font-mono);
      font-size:      var(--font-size-meta);
      color:          var(--text-muted);
      letter-spacing: var(--tracking-mono);
      text-transform: uppercase;
    }

    .pegboard {
      display:        flex;
      flex-direction: column;
      gap:            var(--space-8);
      padding:        var(--space-8) var(--space-4);
    }

    .pane {
      border:         1px solid var(--border-subtle);
      border-radius:  var(--radius-default);
      padding:        var(--space-8) var(--space-4);
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            var(--space-4);
    }

    .pane-label {
      align-self:     flex-start;
      display:        inline-block;
      padding:        var(--space-1) var(--space-3);
      background:     var(--surface-sunken);
      border:         1px solid var(--border-subtle);
      border-radius:  var(--radius-subtle);
      font-family:    var(--font-mono);
      font-size:      var(--font-size-meta);
      letter-spacing: var(--tracking-mono);
      color:          var(--text-muted);
      text-transform: uppercase;
    }

    /* ---- Sessions-list stub behind the sheet ------------------- */
    /*
      Fills the full content area with a dimmed sessions list so
      the viewer understands the sheet is an overlay over the
      primary navigation view. The scrim sits atop the stub.
    */
    .view-project-picker-sheet__sessions-behind {
      flex:           1;
      overflow:       hidden;
      display:        flex;
      flex-direction: column;
      position:       relative;
    }

    /* App header stub inside the sessions view */
    .view-project-picker-sheet__stub-header {
      display:       flex;
      align-items:   center;
      gap:           var(--space-2);
      padding:       var(--space-2) var(--space-3);
      min-height:    var(--touch-target-min);
      background:    var(--surface-page);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink:   0;
    }

    .view-project-picker-sheet__stub-header-title {
      flex:       1;
      text-align: center;
    }

    /* Session rows stub list */
    .view-project-picker-sheet__stub-list {
      flex:           1;
      display:        flex;
      flex-direction: column;
      overflow:       hidden;
    }

    /* The backdrop scrim sits atop the stub sessions */
    .view-project-picker-sheet__sessions-behind .atom-backdrop {
      position: absolute;   /* structural: scrim anchored to sessions region */
      z-index:  2;
    }

    /* ---- Sheet overlay ----------------------------------------- */
    /*
      Absolutely positioned inside atom-device-bezel__content.
      height: var(--sheet-snap-half) clamps the sheet to 50vh of the
      viewport. flex-direction:column lets the sheet card grow upward
      from the bottom edge.
    */
    .view-project-picker-sheet__overlay {
      position: absolute;
      bottom:   0;
      left:     0;
      right:    0;
      z-index:  10;
      display:  flex;
      flex-direction: column;
    }

    /* Sheet card surface */
    .view-project-picker-sheet__sheet {
      background:               var(--surface-overlay);
      border-top-left-radius:   var(--radius-xl);
      border-top-right-radius:  var(--radius-xl);
      box-shadow:               var(--elevation-sheet);
      display:                  flex;
      flex-direction:           column;
      height:                   var(--sheet-snap-half); /* 50vh snap point */
      overflow:                 hidden;
    }

    /* Handle row — centered drag indicator at sheet top */
    .view-project-picker-sheet__handle-row {
      display:         flex;
      justify-content: center;
      padding:         var(--space-3) 0 0;
      flex-shrink:     0;
    }

    /* Modal header area: title centered + close icon-button */
    .view-project-picker-sheet__header {
      display:     flex;
      align-items: center;
      gap:         var(--space-2);
      padding:     var(--space-1) var(--space-3) var(--space-2);
      flex-shrink: 0;
    }

    .view-project-picker-sheet__header-title {
      flex:       1;
      text-align: center;
      margin:     0;
    }

    /* Spacer mirrors close button width for optical centering */
    .view-project-picker-sheet__header-spacer {
      flex-shrink: 0;
      width:       var(--touch-target-min);
    }

    /* Section label row */
    .view-project-picker-sheet__section-label {
      padding:     var(--space-2) var(--space-4) var(--space-1);
      flex-shrink: 0;
    }

    /* Scrollable project rows area */
    .view-project-picker-sheet__rows {
      flex:           1;
      overflow-y:     auto;
      display:        flex;
      flex-direction: column;
      scrollbar-width: none;
    }

    .view-project-picker-sheet__rows::-webkit-scrollbar {
      display: none;
    }

    /* Safe-area bottom buffer */
    .view-project-picker-sheet__safe-area {
      height:      var(--space-8);
      flex-shrink: 0;
    }

    /* ---- Inline project row composition ----------------------- */
    /*
      Structurally identical to mol-host-picker-row but uses a
      package icon instead of a server icon. Built from the same
      atom primitives: icon-glyph + section-label (meta) + accent
      checkmark glyph. Not extracted as a separate molecule because
      it appears in this one view only (Rule of 2 not triggered).
    */
    .view-project-picker-sheet__project-row {
      display:         flex;
      align-items:     center;
      gap:             var(--space-3);
      padding:         var(--space-3) var(--space-4);
      min-height:      var(--touch-target-min);
      background:      transparent;
      border:          none;
      width:           100%;
      text-align:      left;
      cursor:          pointer;
      color:           var(--text-body);
      position:        relative;
      outline:         none;
      transition:      background-color var(--motion-fast) var(--motion-ease-out);
      -webkit-tap-highlight-color: transparent;
    }

    .view-project-picker-sheet__project-row__leading {
      flex-shrink: 0;
      display:     flex;
      align-items: center;
    }

    .view-project-picker-sheet__project-row__body {
      flex:           1;
      min-width:      0;
      display:        flex;
      flex-direction: column;
      gap:            2px; /* structural: sub-token typographic leading */
    }

    .view-project-picker-sheet__project-row__name {
      font-family:   var(--font-mono);
      font-size:     var(--font-size-body);
      font-weight:   var(--font-weight-meta);
      color:         var(--text-body);
      line-height:   var(--line-height-snug);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
    }

    .view-project-picker-sheet__project-row__trailing {
      flex-shrink: 0;
      display:     flex;
      align-items: center;
    }

    /* Check hidden by default; visible only when is-selected */
    .view-project-picker-sheet__project-row__trailing .atom-icon-glyph {
      opacity:    0;
      transition: opacity var(--motion-fast) var(--motion-ease-out);
    }

    /* Selected state: surface-active bg + visible check */
    .view-project-picker-sheet__project-row.is-selected {
      background: var(--surface-active);
    }

    .view-project-picker-sheet__project-row.is-selected
    .view-project-picker-sheet__project-row__trailing .atom-icon-glyph {
      opacity: 1;
    }

    .view-project-picker-sheet__project-row:hover,
    .view-project-picker-sheet__project-row.is-hover {
      background: var(--surface-soft);
    }

    .view-project-picker-sheet__project-row.is-selected:hover,
    .view-project-picker-sheet__project-row.is-selected.is-hover {
      background: var(--surface-soft);
    }

    .view-project-picker-sheet__project-row:active,
    .view-project-picker-sheet__project-row.is-active {
      background: var(--surface-active);
      transform:  scale(0.995);
    }

    .view-project-picker-sheet__project-row:focus-visible,
    .view-project-picker-sheet__project-row.is-focus {
      outline:    none;
      box-shadow: inset 0 0 0 2px var(--border-focus);
    }

  </style>
</head>
<body>

  <!-- ============================================================
       Header plate
  ============================================================ -->
  <div class="preview-plate">
    <h1 class="type-h2">project-picker-sheet</h1>
    <p class="crumb">UC-NAV §B · project picker bottom sheet — half-screen, sessions-list behind</p>
  </div>

  <!-- ============================================================
       Stacked theme panes — dark first, light second
  ============================================================ -->
  <div class="pegboard">

    <!-- ── DARK PANE ─────────────────────────────────────────── -->
    <section class="pane" data-theme="dark">
      <span class="pane-label">dark</span>

      <!-- iPhone 16 Pro Max bezel -->
      <div class="atom-device-bezel">
        <div class="atom-device-bezel__viewport">

          <!-- Dynamic Island -->
          <div class="atom-device-bezel__dynamic-island" aria-hidden="true"></div>

          <!-- Status bar -->
          <div class="atom-device-bezel__status-bar" aria-hidden="true">
            <span class="atom-device-bezel__time">9:41</span>
            <div class="atom-device-bezel__indicators">
              <!-- Signal bars -->
              <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-hidden="true">
                <rect x="0"  y="7" width="3" height="5" rx="1" fill="currentColor"/>
                <rect x="4"  y="4" width="3" height="8" rx="1" fill="currentColor"/>
                <rect x="8"  y="1" width="3" height="11" rx="1" fill="currentColor"/>
                <rect x="12" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".3"/>
              </svg>
              <!-- Wi-Fi -->
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
                <path d="M8 9.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" fill="currentColor"/>
                <path d="M4.5 7.5A5 5 0 0 1 8 6a5 5 0 0 1 3.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                <path d="M1.5 4.5A9.5 9.5 0 0 1 8 2a9.5 9.5 0 0 1 6.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              </svg>
              <!-- Battery -->
              <div class="atom-device-bezel__battery" aria-hidden="true">
                <div class="atom-device-bezel__battery-body">
                  <div class="atom-device-bezel__battery-fill"></div>
                </div>
              </div>
            </div>
          </div><!-- /status-bar -->

          <!-- Content area (flex:1, position:relative for absolute overlay) -->
          <div class="atom-device-bezel__content">

            <!-- Dimmed sessions-list view (below the sheet) -->
            <div class="view-project-picker-sheet__sessions-behind" aria-hidden="true">

              <!-- Scrim backdrop over sessions content -->
              <div class="atom-backdrop atom-backdrop--scrim" aria-hidden="true"></div>

              <!-- App header stub -->
              <div class="view-project-picker-sheet__stub-header">
                <!-- Back icon placeholder -->
                <button
                  class="atom-icon-button atom-icon-button--ghost atom-icon-button--md"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                >
                  <span class="atom-icon-button__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <polyline points="15 18 9 12 15 6"/>
                    </svg>
                  </span>
                </button>
                <!-- Title chip — the project chip tapped to open this sheet -->
                <div class="view-project-picker-sheet__stub-header-title">
                  <button
                    class="atom-pill atom-pill--default atom-pill--md"
                    type="button"
                    tabindex="-1"
                    aria-hidden="true"
                  >
                    <span class="atom-pill__icon">
                      <!-- Package icon -->
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M16.5 9.4 7.5 4.21"/>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                      </svg>
                    </span>
                    superset
                    <!-- Chevron down -->
                    <svg class="atom-icon-glyph atom-icon-glyph--xs atom-icon-glyph--muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </button>
                </div>
                <!-- Actions placeholder -->
                <button
                  class="atom-icon-button atom-icon-button--ghost atom-icon-button--md"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                >
                  <span class="atom-icon-button__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
                    </svg>
                  </span>
                </button>
              </div><!-- /stub-header -->

              <!-- Session rows stub -->
              <div class="view-project-picker-sheet__stub-list">

                <button
                  class="mol-session-row"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                >
                  <span class="mol-session-row__leading">
                    <span class="atom-status-dot atom-status-dot--live atom-status-dot--sm" aria-hidden="true"></span>
                  </span>
                  <span class="mol-session-row__body">
                    <span class="mol-session-row__title type-body">Refactor billing API endpoints</span>
                    <span class="mol-session-row__meta type-meta">9:41 AM · 14 messages</span>
                  </span>
                </button>

                <hr class="atom-divider atom-divider--horizontal atom-divider--hairline">

                <button
                  class="mol-session-row"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                >
                  <span class="mol-session-row__leading">
                    <span class="atom-status-dot atom-status-dot--neutral atom-status-dot--sm" aria-hidden="true"></span>
                  </span>
                  <span class="mol-session-row__body">
                    <span class="mol-session-row__title type-body">Update Drizzle schema for workspaces</span>
                    <span class="mol-session-row__meta type-meta">Yesterday · 8 messages</span>
                  </span>
                </button>

                <hr class="atom-divider atom-divider--horizontal atom-divider--hairline">

                <button
                  class="mol-session-row"
                  type="button"
                  tabindex="-1"
                  aria-hidden="true"
                >
                  <span class="mol-session-row__leading">
                    <span class="atom-status-dot atom-status-dot--neutral atom-status-dot--sm" aria-hidden="true"></span>
                  </span>
                  <span class="mol-session-row__body">
                    <span class="mol-session-row__title type-body">Debug tRPC subscription timeout</span>
                    <span class="mol-session-row__meta type-meta">Mon · 3 messages</span>
                  </span>
                </button>

              </div><!-- /stub-list -->

            </div><!-- /sessions-behind -->

            <!-- Sheet overlay — positioned at bottom of content area -->
            <div
              class="view-project-picker-sheet__overlay"
              role="dialog"
              aria-modal="true"
              aria-label="Switch project"
            >

              <!-- Sheet card (50vh snap point) -->
              <div class="view-project-picker-sheet__sheet">

                <!-- Drag handle -->
                <div class="view-project-picker-sheet__handle-row" aria-hidden="true">
                  <div class="atom-home-indicator atom-home-indicator--sheet-handle atom-home-indicator--muted"></div>
                </div>

                <!-- Sheet header: diamond icon + title + close button -->
                <div class="view-project-picker-sheet__header">
                  <!-- Spacer (mirrors close button) for optical centering -->
                  <span
                    class="view-project-picker-sheet__header-spacer"
                    aria-hidden="true"
                  ></span>

                  <!-- Title -->
                  <h2
                    class="view-project-picker-sheet__header-title type-label-strong"
                    id="project-picker-dark-title"
                  >
                    Switch project
                  </h2>

                  <!-- Close button -->
                  <button
                    class="atom-icon-button atom-icon-button--ghost atom-icon-button--md"
                    type="button"
                    aria-label="Close project picker"
                  >
                    <span class="atom-icon-button__icon">
                      <!-- X icon -->
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6"  y1="6" x2="18" y2="18"/>
                      </svg>
                    </span>
                  </button>
                </div><!-- /header -->

                <!-- Section label -->
                <div class="view-project-picker-sheet__section-label">
                  <span class="atom-section-label atom-section-label--faint">This organization</span>
                </div>

                <!-- Project rows -->
                <div
                  class="view-project-picker-sheet__rows"
                  role="listbox"
                  aria-label="Projects"
                  aria-labelledby="project-picker-dark-title"
                >

                  <!-- Row 1: superset (currently selected) -->
                  <button
                    class="view-project-picker-sheet__project-row is-selected"
                    type="button"
                    role="option"
                    aria-selected="true"
                    aria-label="superset, 4 workspaces, 12 sessions, currently selected"
                  >
                    <span class="view-project-picker-sheet__project-row__leading">
                      <!-- Package glyph — sm + muted -->
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--muted"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="M16.5 9.4 7.5 4.21"/>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                      </svg>
                    </span>
                    <span class="view-project-picker-sheet__project-row__body">
                      <span class="view-project-picker-sheet__project-row__name">superset</span>
                      <span class="atom-section-label">4 workspaces · 12 sessions</span>
                    </span>
                    <span class="view-project-picker-sheet__project-row__trailing">
                      <!-- Check mark — visible via is-selected -->
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--accent"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    </span>
                  </button>

                  <hr class="atom-divider atom-divider--horizontal atom-divider--hairline">

                  <!-- Row 2: JustinCode -->
                  <button
                    class="view-project-picker-sheet__project-row"
                    type="button"
                    role="option"
                    aria-selected="false"
                    aria-label="JustinCode, 1 workspace, 2 sessions, tap to switch"
                  >
                    <span class="view-project-picker-sheet__project-row__leading">
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--muted"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="M16.5 9.4 7.5 4.21"/>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                      </svg>
                    </span>
                    <span class="view-project-picker-sheet__project-row__body">
                      <span class="view-project-picker-sheet__project-row__name">JustinCode</span>
                      <span class="atom-section-label">1 workspace · 2 sessions</span>
                    </span>
                    <span class="view-project-picker-sheet__project-row__trailing">
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--accent"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    </span>
                  </button>

                  <hr class="atom-divider atom-divider--horizontal atom-divider--hairline">

                  <!-- Row 3: LaneShadow -->
                  <button
                    class="view-project-picker-sheet__project-row"
                    type="button"
                    role="option"
                    aria-selected="false"
                    aria-label="LaneShadow, 2 workspaces, no sessions yet, tap to switch"
                  >
                    <span class="view-project-picker-sheet__project-row__leading">
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--muted"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <path d="M16.5 9.4 7.5 4.21"/>
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                      </svg>
                    </span>
                    <span class="view-project-picker-sheet__project-row__body">
                      <span class="view-project-picker-sheet__project-row__name">LaneShadow</span>
                      <span class="atom-section-label">2 workspaces · no sessions yet</span>
                    </span>
                    <span class="view-project-picker-sheet__project-row__trailing">
                      <svg
                        class="atom-icon-glyph atom-icon-glyph--sm atom-icon-glyph--accent"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                      >
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    </span>
                  </button>

                </div><!-- /rows -->

                <!-- Bottom safe-area buffer -->
                <div class="view-project-picker-sheet__safe-area" aria-hidden="true"></div>

              </div><!-- /sheet -->

            </div><!-- /overlay -->

          </div><!-- /atom-device-bezel__content -->

          <!-- Home indicator -->
