    body {

      flex-direction: column;
      align-items:    center;

      display:         flex;

      padding-bottom:   var(--safe-area-bottom, 0px);
      position:         relative;

      right:    var(--space-4);
      bottom:   calc(var(--touch-target-min) + var(--space-6));

      height:      1px;
      padding:     0;
      margin:      -1px;

      clip:        rect(0 0 0 0);
      white-space: nowrap;
